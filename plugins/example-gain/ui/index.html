<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Example Gain</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      margin: 0;
      background: #fafafa;
    }
    h3 { margin: 0 0 8px; font-size: 14px; }
    label { display: block; margin-bottom: 4px; font-size: 12px; color: #555; }
    input[type="range"] { width: 100%; }
    .value { font-size: 18px; font-weight: 600; color: #333; text-align: center; }
  </style>
</head>
<body>
  <h3>Gain</h3>
  <div class="value" id="gain-value">1.0</div>
  <label>Gain (0.0 - 2.0)</label>
  <input type="range" id="gain-slider" min="0" max="2" step="0.01" value="1.0" />

  <script>
    const slider = document.getElementById("gain-slider");
    const value = document.getElementById("gain-value");

    slider.addEventListener("input", () => {
      const val = parseFloat(slider.value);
      value.textContent = val.toFixed(2);
      window.parent.postMessage({
        type: "param_change",
        name: "gain",
        value: val,
      }, "*");
    });
  </script>
</body>
</html>
